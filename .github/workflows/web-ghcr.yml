name: web-ghcr

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-ghcr.yml"
      - "deploy/**"
      - "src/**"
      - "public/**"
      - "data/**"
      - "scripts/**"
      - "Dockerfile"
      - ".dockerignore"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "eslint.config.js"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: felory/chinese-magic-web
  APP_NAME: chinese-magic
  APP_PORT: "18080"
  CONTAINER_NAME: chinese-magic-web

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.17.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    concurrency:
      group: chinese-magic-web-production
      cancel-in-progress: false

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'REMOTE'
          set -e
          mkdir -p /app/chinese-magic
          if [ ! -f /app/chinese-magic/.env ]; then
            touch /app/chinese-magic/.env
          fi
          docker compose version
          REMOTE

      - name: Upload compose file
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ secrets.VPS_PORT }}" \
            deploy/docker-compose.prod.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/app/chinese-magic/docker-compose.yml"

      - name: Deploy and health check
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'REMOTE'
          set -e
          cd /app/chinese-magic
          docker compose pull
          docker compose up -d

          health_ok=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health; then
              echo
              health_ok=1
              break
            fi

            echo "Health check attempt ${attempt}/30 failed; waiting..."
            sleep 2
          done

          if [ "${health_ok}" -ne 1 ]; then
            echo "Deployment health check failed after waiting."
            docker logs --tail 80 chinese-magic-web
            exit 1
          fi

          echo "Deployment health check passed."
          docker compose ps
          REMOTE
